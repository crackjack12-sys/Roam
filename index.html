<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Roam — What's open today</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --text: #f0ede8;
      --muted: #888;
      --dim: #444;
      --accent: #c8f560;
      --accent-dark: #0d0d0d;
      --gold: #f5c842;
      --green: #4ade80;
      --yellow: #fbbf24;
      --orange: #fb923c;
      --radius: 14px;
      --radius-sm: 8px;
      --nav-h: 64px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    /* ── APP SHELL ── */
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: var(--nav-h); }

    /* ── HEADER ── */
    .header { padding: 52px 20px 0; }
    .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .logo { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -1px; color: var(--accent); line-height: 1; }
    .location-pill { display: flex; align-items: center; gap: 5px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; font-size: 12px; color: var(--muted); cursor: pointer; }
    .loc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .tagline { font-size: 13px; color: var(--muted); margin-top: 4px; }

    /* ── SEARCH BAR ── */
    .search-wrap { padding: 16px 20px 0; }
    .search-box {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 0 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-box:focus-within {
      border-color: rgba(200,245,96,0.4);
      box-shadow: 0 0 0 3px rgba(200,245,96,0.08);
    }
    .search-icon { color: var(--dim); flex-shrink: 0; }
    .search-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 14px; padding: 13px 0;
    }
    .search-input::placeholder { color: var(--dim); }
    .search-clear {
      background: none; border: none; color: var(--dim);
      cursor: pointer; font-size: 13px; padding: 4px;
      border-radius: 50%; display: none; transition: color 0.15s;
      flex-shrink: 0; line-height: 1;
    }
    .search-clear:hover { color: var(--text); }
    .search-clear.visible { display: block; }
    .search-hint { font-size: 12px; color: var(--dim); margin-top: 7px; padding-left: 2px; min-height: 16px; }

    /* hide non-matching cards */
    .activity-card.search-hidden { display: none !important; }
    .featured-wrap.search-hidden { display: none !important; }

    /* ── DATE STRIP ── */
    .date-strip { display: flex; gap: 8px; padding: 16px 20px 0; overflow-x: auto; scrollbar-width: none; }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-pill { flex-shrink: 0; padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); background: var(--surface); color: var(--muted); }
    .date-pill.active { background: var(--accent); color: var(--accent-dark); border-color: var(--accent); font-weight: 600; }

    /* ── FILTER CHIPS ── */
    .filters { display: flex; gap: 8px; padding: 12px 20px 0; overflow-x: auto; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); background: transparent; color: var(--muted); }
    .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(200, 245, 96, 0.08); }

    /* ── SECTION LABEL ── */
    .section-label { padding: 20px 20px 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); }
    .section-label span { color: var(--accent); }

    /* ── SPIN BANNER ── */
    .spin-banner {
      margin: 16px 20px 0;
      background: linear-gradient(135deg, #1a1f0e 0%, #161616 100%);
      border: 1px solid rgba(200,245,96,0.2);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; text-decoration: none;
      transition: border-color 0.2s, transform 0.15s;
    }
    .spin-banner:active { transform: scale(0.98); }
    .spin-banner:hover { border-color: rgba(200,245,96,0.4); }
    .spin-banner-left { display: flex; align-items: center; gap: 12px; }
    .spin-banner-icon { font-size: 28px; line-height: 1; }
    .spin-banner-text strong { display: block; font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .spin-banner-text span { font-size: 12px; color: var(--muted); }
    .spin-banner-cta { font-size: 12px; font-weight: 600; color: var(--accent); white-space: nowrap; }

    /* ── FEATURED CARD ── */
    .featured-wrap { padding: 0 20px; }
    .featured-card { background: var(--surface); border: 1px solid #2d3a1a; border-radius: var(--radius); padding: 16px; position: relative; overflow: hidden; cursor: pointer; transition: transform 0.2s; }
    .featured-card:active { transform: scale(0.98); }
    .featured-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
    .featured-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(200,245,96,0.12); border: 1px solid rgba(200,245,96,0.3); color: var(--accent); font-size: 10px; font-weight: 600; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 6px; margin-bottom: 10px; }
    .featured-badge::before { content: '★'; font-size: 9px; }
    .featured-card h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 5px; line-height: 1.2; }
    .featured-card p { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; }
    .featured-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .meta-tag { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 500; }
    .tag-price-paid { background: rgba(245,200,66,0.12); color: var(--gold); }
    .tag-price-free { background: rgba(74,222,128,0.12); color: var(--green); }
    .tag-price-cheap { background: rgba(251,191,36,0.12); color: var(--yellow); }
    .tag-neutral { background: var(--surface2); color: var(--muted); }
    .tag-open { background: rgba(74,222,128,0.1); color: var(--green); }
    .featured-cta { display: flex; align-items: center; justify-content: space-between; }
    .cta-btn { background: var(--accent); color: var(--accent-dark); font-size: 13px; font-weight: 600; padding: 10px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
    .cta-btn:hover { opacity: 0.9; }
    .rating-pill { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); }
    .star { color: var(--gold); font-size: 11px; }

    /* ── ACTIVITY CARDS ── */
    .card-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
    .activity-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
    .activity-card:active { transform: scale(0.98); background: var(--surface2); }
    .activity-card.closed { opacity: 0.45; }
    .card-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; background: var(--surface2); }
    .card-body { flex: 1; min-width: 0; }
    .card-body h3 { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .card-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .open-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .closed-dot { width: 5px; height: 5px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
    .card-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .price-label { font-size: 12px; font-weight: 600; }
    .price-free { color: var(--green); }
    .price-cheap { color: var(--yellow); }
    .price-paid { color: var(--orange); }
    .chevron { color: var(--dim); font-size: 16px; line-height: 1; }

    /* ── NO SEARCH RESULTS ── */
    .search-empty { display: none; text-align: center; padding: 48px 20px; color: var(--muted); }
    .search-empty.show { display: block; }
    .search-empty .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .search-empty p { font-size: 14px; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }

    /* ── BOTTOM NAV ── */
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: var(--nav-h); background: rgba(13,13,13,0.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding: 0 10px; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; cursor: pointer; text-decoration: none; }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 500; color: var(--muted); }
    .nav-item.active .nav-label { color: var(--accent); }
    .nav-item.active .nav-icon { filter: drop-shadow(0 0 4px var(--accent)); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .animate { animation: fadeUp 0.4s ease both; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.1s; }
    .delay-3 { animation-delay: 0.15s; }
    .delay-4 { animation-delay: 0.2s; }
    .delay-5 { animation-delay: 0.25s; }
  </style>
</head>
<body>
<div class="app">

  <div class="header animate">
    <div class="header-top">
      <div class="logo">Roam</div>
      <div class="location-pill">
        <div class="loc-dot"></div>
        Bethesda, MD
      </div>
    </div>
    <div class="tagline">What's open today near you</div>
  </div>

  <!-- SEARCH BAR -->
  <div class="search-wrap animate delay-1">
    <div class="search-box">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" class="search-input" placeholder="Search activities, vibes, places…" autocomplete="off" />
      <button class="search-clear" id="search-clear" aria-label="Clear">✕</button>
    </div>
    <div class="search-hint" id="search-hint"></div>
  </div>

  <div class="date-strip animate delay-1" id="dateStrip"></div>
  <div class="filters animate delay-2" id="filters"></div>

  <!-- SPIN WHEEL BANNER -->
  <a href="spin.html" class="spin-banner animate delay-2">
    <div class="spin-banner-left">
      <div class="spin-banner-icon">🎰</div>
      <div class="spin-banner-text">
        <strong>Not sure what to do?</strong>
        <span>Spin the wheel — we'll pick for you</span>
      </div>
    </div>
    <div class="spin-banner-cta">Spin →</div>
  </a>

  <div id="featuredSection"></div>

  <div class="section-label animate delay-3">Everything open <span id="openCount"></span></div>
  <div class="card-list animate delay-4" id="cardList"></div>
  <div class="search-empty" id="search-empty">
    <div class="empty-icon">🔍</div>
    <p>No results for "<span id="search-empty-term"></span>"</p>
  </div>

  <div style="height: 20px;"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="nav">
  <a href="index.html" class="nav-item active">
    <span class="nav-icon">⚡</span>
    <span class="nav-label">Today</span>
  </a>
  <a href="spin.html" class="nav-item">
    <span class="nav-icon">🎰</span>
    <span class="nav-label">Spin</span>
  </a>
  <a href="map.html" class="nav-item">
    <span class="nav-icon">🗺</span>
    <span class="nav-label">Map</span>
  </a>
  <a href="saved.html" class="nav-item">
    <span class="nav-icon">🔖</span>
    <span class="nav-label">Saved</span>
  </a>
</nav>

<script>
  // ── CATEGORY ICONS ──
  const ICONS = {
    'Outdoors': '🌳', 'Education': '📚', 'Arts': '🎨',
    'Activities': '🎯', 'Entertainment': '🎬', 'Fitness': '🏊',
    'Sports': '⚽', 'Food': '🍔', 'Chill': '😌', 'Culture': '🏛',
    'Seasonal': '🌸', 'Unique': '✨', 'default': '📍'
  };

  // ── DATE STRIP ──
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const today = new Date();
  const strip = document.getElementById('dateStrip');
  for (let i = 0; i < 5; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const pill = document.createElement('div');
    pill.className = 'date-pill' + (i === 0 ? ' active' : '');
    pill.textContent = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : days[d.getDay()];
    strip.appendChild(pill);
  }

  // ── ACTIVE FILTER STATE ──
  let activeFilter = 'all';

  // ── FILTER CHIPS ──
  const filterDefs = [
    { key: 'all',          label: 'All' },
    { key: 'free',         label: '🟢 Free' },
    { key: 'cheap',        label: '🟡 Under $10' },
    { key: 'paid',         label: '🔴 Paid' },
    { key: 'Outdoors',     label: 'Outdoors' },
    { key: 'Activities',   label: 'Activities' },
    { key: 'Entertainment',label: 'Entertainment' },
    { key: 'Arts',         label: 'Arts' },
    { key: 'Chill',        label: 'Chill' },
    { key: 'Food',         label: 'Food' },
  ];
  const filtersEl = document.getElementById('filters');
  filterDefs.forEach(f => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (f.key === 'all' ? ' active' : '');
    chip.textContent = f.label;
    chip.addEventListener('click', () => {
      activeFilter = f.key;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      renderListings(window._listings);
    });
    filtersEl.appendChild(chip);
  });

  // ── PRICE TAG CLASS ──
  function priceClass(tier) {
    return tier === 'free' ? 'price-free' : tier === 'cheap' ? 'price-cheap' : 'price-paid';
  }
  function metaTagClass(tier) {
    return tier === 'free' ? 'tag-price-free' : tier === 'cheap' ? 'tag-price-cheap' : 'tag-price-paid';
  }

  // ── RENDER FEATURED ──
  function renderFeatured(listing) {
    const section = document.getElementById('featuredSection');
    if (!listing) { section.innerHTML = ''; return; }
    section.innerHTML = `
      <div class="section-label animate delay-2">✦ <span>Featured today</span></div>
      <div class="featured-wrap animate delay-2" data-name="${listing.name}" data-category="${listing.category}" data-description="${listing.description}">
        <div class="featured-card" onclick="window.location='detail.html?id=${listing.id}'">
          <div class="featured-badge">FEATURED</div>
          <h2>${listing.name}</h2>
          <p>${listing.description}</p>
          <div class="featured-meta">
            <span class="meta-tag ${metaTagClass(listing.priceTier)}">${listing.priceLabel}</span>
            <span class="meta-tag tag-open">${listing.isOpenNow ? '● Open now' : '○ Closed'}</span>
            <span class="meta-tag tag-neutral">${listing.category}</span>
          </div>
          <div class="featured-cta">
            <button class="cta-btn">${listing.sponsoredCta || 'View details'} →</button>
            <div class="rating-pill"><span class="star">★</span> ${listing.rating}</div>
          </div>
        </div>
      </div>`;
  }

  // ── RENDER CARD LIST ──
  function renderListings(listings) {
    const list    = document.getElementById('cardList');
    const countEl = document.getElementById('openCount');

    let filtered = listings.filter(l => !l.featured);
    if (activeFilter === 'free')       filtered = filtered.filter(l => l.priceTier === 'free');
    else if (activeFilter === 'cheap') filtered = filtered.filter(l => l.priceTier === 'cheap');
    else if (activeFilter === 'paid')  filtered = filtered.filter(l => l.priceTier === 'paid');
    else if (activeFilter !== 'all')   filtered = filtered.filter(l => l.category === activeFilter);

    const open   = filtered.filter(l => l.isOpenNow);
    const closed = filtered.filter(l => !l.isOpenNow);
    const sorted = [...open, ...closed];

    countEl.textContent = `(${open.length} open)`;

    if (sorted.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>Nothing here yet</h3><p>Try a different filter</p></div>`;
      return;
    }

    list.innerHTML = sorted.map(l => `
      <a href="detail.html?id=${l.id}"
         class="activity-card${l.isOpenNow ? '' : ' closed'}"
         data-name="${l.name}"
         data-category="${l.category}"
         data-description="${(l.description || '').replace(/"/g, '&quot;')}"
         data-address="${(l.address || '').replace(/"/g, '&quot;')}">
        <div class="card-icon">${ICONS[l.category] || ICONS.default}</div>
        <div class="card-body">
          <h3>${l.name}</h3>
          <div class="card-meta">
            <div class="${l.isOpenNow ? 'open-dot' : 'closed-dot'}"></div>
            <span>${l.isOpenNow ? 'Open now' : 'Closed'}</span>
            <span>·</span>
            <span>${l.category}</span>
          </div>
        </div>
        <div class="card-right">
          <span class="price-label ${priceClass(l.priceTier)}">${l.priceLabel}</span>
          <span class="chevron">›</span>
        </div>
      </a>`).join('');

    // re-apply any active search after re-render
    const q = document.getElementById('search-input').value.trim();
    if (q) runSearch(q);
  }

  // ── LOAD DATA ──
  fetch('listings.json')
    .then(r => r.json())
    .then(data => {
      window._listings = data;
      const featured = data.find(l => l.featured && l.isOpenNow) || data.find(l => l.featured);
      renderFeatured(featured);
      renderListings(data);
    })
    .catch(() => {
      document.getElementById('cardList').innerHTML =
        `<div class="empty"><div class="empty-icon">⚠️</div><h3>Couldn't load listings</h3><p>Make sure listings.json is in the same folder</p></div>`;
    });

  // ── SEARCH ──
  function runSearch(query) {
    const q         = query.trim().toLowerCase();
    const cards     = document.querySelectorAll('.activity-card');
    const featured  = document.querySelector('.featured-wrap');
    const emptyMsg  = document.getElementById('search-empty');
    const emptyTerm = document.getElementById('search-empty-term');
    const hint      = document.getElementById('search-hint');
    let visible     = 0;

    cards.forEach(card => {
      if (!q) { card.classList.remove('search-hidden'); visible++; return; }
      const text = [
        card.dataset.name        || '',
        card.dataset.category    || '',
        card.dataset.description || '',
        card.dataset.address     || '',
      ].join(' ').toLowerCase();

      if (text.includes(q)) { card.classList.remove('search-hidden'); visible++; }
      else                  { card.classList.add('search-hidden'); }
    });

    // also filter featured card
    if (featured) {
      if (!q) {
        featured.classList.remove('search-hidden');
      } else {
        const text = [featured.dataset.name, featured.dataset.category, featured.dataset.description].join(' ').toLowerCase();
        featured.classList.toggle('search-hidden', !text.includes(q));
      }
    }

    emptyMsg.classList.toggle('show', q.length > 0 && visible === 0);
    if (q && visible === 0) emptyTerm.textContent = query.trim();
    hint.textContent = q ? (visible === 0 ? 'No results' : `${visible} result${visible === 1 ? '' : 's'}`) : '';
    document.getElementById('search-clear').classList.toggle('visible', q.length > 0);
  }

  document.getElementById('search-input').addEventListener('input', e => runSearch(e.target.value));
  document.getElementById('search-clear').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    runSearch('');
    document.getElementById('search-input').focus();
  });
</script>
</body>
</html>
