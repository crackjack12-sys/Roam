<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Roam — Saved</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f; --border: #2a2a2a;
      --text: #f0ede8; --muted: #888; --dim: #444; --accent: #c8f560;
      --accent-dark: #0d0d0d; --green: #4ade80; --yellow: #fbbf24;
      --orange: #fb923c; --radius: 14px; --radius-sm: 8px; --nav-h: 64px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
    a { text-decoration: none; color: inherit; }
    .app { max-width: 430px; margin: 0 auto; padding-bottom: calc(var(--nav-h) + 20px); }

    .header { padding: 52px 20px 20px; }
    .header h1 { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 4px; }
    .header p { font-size: 13px; color: var(--muted); }

    .card-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
    .activity-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
    .activity-card:active { transform: scale(0.98); background: var(--surface2); }
    .card-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; background: var(--surface2); }
    .card-body { flex: 1; min-width: 0; }
    .card-body h3 { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .card-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
    .open-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .closed-dot { width: 5px; height: 5px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
    .card-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .price-label { font-size: 12px; font-weight: 600; }
    .price-free { color: var(--green); } .price-cheap { color: var(--yellow); } .price-paid { color: var(--orange); }
    .chevron { color: var(--dim); font-size: 16px; }

    .empty { text-align: center; padding: 80px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 8px; }
    .empty p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
    .explore-btn { display: inline-block; background: var(--accent); color: var(--accent-dark); font-size: 14px; font-weight: 700; padding: 12px 24px; border-radius: var(--radius-sm); font-family: 'Syne', sans-serif; }

    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; height: var(--nav-h); background: rgba(13,13,13,0.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-around; padding: 0 10px; z-index: 100; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; cursor: pointer; text-decoration: none; }
    .nav-icon { font-size: 20px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 500; color: var(--muted); }
    .nav-item.active .nav-label { color: var(--accent); }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .animate { animation: fadeUp 0.35s ease both; }
    .delay-1 { animation-delay: 0.05s; }
  </style>
</head>
<body>
<div class="app">
  <div class="header animate">
    <h1>Saved</h1>
    <p id="savedCount">Your saved places</p>
  </div>
  <div class="card-list animate delay-1" id="cardList"></div>
</div>

<nav class="nav">
  <a href="index.html" class="nav-item"><span class="nav-icon">⚡</span><span class="nav-label">Today</span></a>
  <a href="browse.html" class="nav-item"><span class="nav-icon">🗂</span><span class="nav-label">Browse</span></a>
  <a href="map.html" class="nav-item"><span class="nav-icon">🗺</span><span class="nav-label">Map</span></a>
  <a href="saved.html" class="nav-item active"><span class="nav-icon">🔖</span><span class="nav-label">Saved</span></a>
</nav>

<script>
  const ICONS = {
    'Outdoors':'🌳','Education':'📚','Arts':'🎨','Activities':'🎯',
    'Entertainment':'🎬','Fitness':'🏊','Sports':'⚽','default':'📍'
  };
  function priceClass(tier) {
    return tier === 'free' ? 'price-free' : tier === 'cheap' ? 'price-cheap' : 'price-paid';
  }

  const savedIds = JSON.parse(localStorage.getItem('roam_saved') || '[]');
  const list = document.getElementById('cardList');

  if (savedIds.length === 0) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔖</div>
        <h3>Nothing saved yet</h3>
        <p>Tap the bookmark icon on any activity to save it for later</p>
        <a href="index.html" class="explore-btn">Explore today →</a>
      </div>`;
    document.getElementById('savedCount').textContent = '0 saved places';
  } else {
    fetch('listings.json')
      .then(r => r.json())
      .then(data => {
        const saved = data.filter(l => savedIds.includes(l.id));
        document.getElementById('savedCount').textContent = `${saved.length} saved place${saved.length !== 1 ? 's' : ''}`;
        list.innerHTML = saved.map(l => `
          <a href="detail.html?id=${l.id}" class="activity-card">
            <div class="card-icon">${ICONS[l.category] || ICONS.default}</div>
            <div class="card-body">
              <h3>${l.name}</h3>
              <div class="card-meta">
                <div class="${l.isOpenNow ? 'open-dot' : 'closed-dot'}"></div>
                <span>${l.isOpenNow ? 'Open now' : 'Closed'}</span>
                <span>·</span><span>${l.category}</span>
              </div>
            </div>
            <div class="card-right">
              <span class="price-label ${priceClass(l.priceTier)}">${l.priceLabel}</span>
              <span class="chevron">›</span>
            </div>
          </a>`).join('');
      });
  }
</script>
</body>
</html>
