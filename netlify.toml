# ============================================================
# Netlify Configuration for Roam
# ============================================================
# This file tells Netlify how to deploy your site.
# It lives in the root of your project folder.
# ============================================================

[build]
  # The folder Netlify will publish — since all your HTML files
  # are in the root, we publish the root itself
  publish = "."

  # No build command needed — this is a plain HTML/JS site
  # If you ever add a framework like React later, you'd put
  # the build command here (e.g. "npm run build")
  command = ""

# ── REDIRECTS ──
# Make sure the app works cleanly on all URLs
[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# ── HEADERS ──
# These security headers protect your users
# and also improve your Google Lighthouse score
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache HTML files for a short time so updates show quickly
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"

# Cache the listings.json longer since it updates on a schedule
[[headers]]
  for = "/listings.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
